version: 2

models:
  - name: stg_jaffle_shop__customers
    description: Customer data from Jaffle Shop

    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    description: Orders from Jaffle Shop

    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null